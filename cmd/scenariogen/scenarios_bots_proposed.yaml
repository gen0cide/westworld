  - id: bot-mine-coal-bank-cycle
    category: skills
    hosts: any-drone
    admin: true
    recall_query: mining coal rock bank deposit banker al-kharid powerskill
    setup:
      - setstat 30 mining
      - setcurrentstats 30 mining
      - item 156 1
      - teleport 68 593
    body:
      - prev_xp = self.skills.mining.xp
      - deposited = 0
      - rock = world.locs.rocks.nearest(self.position)
      - 'if rock == null { abort "FAIL: no coal rock near (68,593)" }'
      - |-
        for i in 0..1 {
            repeat {
                interact_at(rock)
                wait 2
            } until inventory.count(155) >= i + 1 timeout 60
            rock = world.locs.rocks.nearest(self.position)
            if rock == null { abort f"FAIL: lost coal rock binding after pass {i}" }
        }
      - have = inventory.count(155)
      - 'if have < 2 { abort f"FAIL: only mined {have} coal before banking" }'
      - 'command("teleport 90 690")'
      - wait 1.5
      - ok = wait_until(_ => world.npcs.find(n => n.name.lower == "banker") != null, 8)
      - 'if not ok { abort "FAIL: no banker loaded at Al-Kharid bank (90,690)" }'
      - banker = world.npcs.find(n => n.name.lower == "banker")
      - open_bank(banker)
      - |-
        select {
            on bank_opened(max) {}
            timeout 6s { abort "FAIL: bank never opened after open_bank(banker)" }
        }
      - deposit(inventory.find(155), have)
      - wait 1
      - deposited = have
      - close_bank()
      - 'if self.skills.mining.xp < prev_xp + 400 { abort f"FAIL: mining xp delta {self.skills.mining.xp - prev_xp} < 400" }'
      - 'if inventory.find(155) != null { abort "FAIL: coal still in inventory after deposit" }'
    pass: self.skills.mining.xp >= prev_xp + 400 and inventory.find(155) == null and deposited == 2
    timeout: 170
    notes: 'Powerskilling-with-banking variant (mine -> bank -> resume, hoarding not dropping). Coal Rock def 110/111 ("Rock", cmd1 Mine) verified at (68,593) in SceneryLocs.json. coal id 155, reqLvl 30, exp 200, depletion 19, respawn 25 (ObjectMining.xml). Banker def 268 verified at Al-Kharid bank (90,690)/(91,691)/(87,694) in NpcLocs.json; teleport 90 690 is exact. 2 coal x 200 = +400 xp. Uses the IMPLEMENTED bank_opened event for post-open readiness instead of world.bank.is_open. NEEDS VERB: world.bank.is_open accessor (dsl/spec/accessors.go marks it NotYetImplemented) — confirm/implement the bank-state mirror flag so a wait_until(_ => world.bank.is_open, 6) readiness predicate works; for now this scenario uses select{on bank_opened}.'

  - id: bot-gem-mine-shilo-loop
    category: skills
    hosts: any-drone
    admin: true
    recall_query: gem mining shilo village gem rocks uncut sapphire emerald pickaxe
    setup:
      - setstat 50 mining
      - setcurrentstats 50 mining
      - item 156 1
      - teleport 427 819
    body:
      - prev_xp = self.skills.mining.xp
      - gems = 0
      - rock = world.locs.rocks.nearest(self.position)
      - 'if rock == null { abort "FAIL: no gem rock at Shilo (427,819) — Shilo access gate may block region even after admin teleport" }'
      - |-
        for i in 0..2 {
            repeat {
                interact_at(rock)
                wait 2
            } until (inventory.find(160) != null or inventory.find(159) != null or inventory.find(158) != null or inventory.find(157) != null or inventory.find(891) != null or inventory.find(890) != null or inventory.find(889) != null) timeout 90
            g = inventory.find(160)
            if g == null { g = inventory.find(159) }
            if g == null { g = inventory.find(158) }
            if g == null { g = inventory.find(157) }
            if g == null { g = inventory.find(891) }
            if g == null { g = inventory.find(890) }
            if g == null { g = inventory.find(889) }
            if g == null { abort f"FAIL: no uncut gem after pass {i}" }
            drop(g)
            gems = gems + 1
            wait 1
            rock = world.locs.rocks.nearest(self.position)
            if rock == null { abort f"FAIL: lost gem rock binding after pass {i}" }
        }
      - 'if self.skills.mining.xp <= prev_xp { abort f"FAIL: no mining xp gained from gem rock (delta {self.skills.mining.xp - prev_xp})" }'
    pass: self.skills.mining.xp > prev_xp and gems == 3
    timeout: 180
    notes: 'Shilo gem-rock grinder (hours collecting uncut gems by the weighted drop table, dropping each). GEM_ROCK def 588 ("Gem Rocks", cmd1 Mine) verified at (426-428,819-821) in SceneryLocs.json and as the GEM_ROCK=588 constant in GemMining.java. Handler requires mining lvl >= 40 (set 50) and grants a FIXED +260 mining xp per gem. Weighted uncut pool (gemWeightsWithoutDragonstone {64,32,16,8,3,3,2}) over uncut ids: UNCUT_SAPPHIRE 160, UNCUT_EMERALD 159, UNCUT_RUBY 158, UNCUT_DIAMOND 157, UNCUT_OPAL 891, UNCUT_JADE 890, UNCUT_RED_TOPAZ 889 (corrected from the archetype, which listed cut ids 894/893/892 — those are the CUT Opal/Jade/Topaz). Assert xp>prev and gems==3, never a fixed gem id (weighted random). Bronze Pickaxe id 156. NEEDS VERB: inventory.find_any([160,159,158,157,891,890,889]) helper — the 7-way or-chain + null-cascade is verbose; a multi-id find / randomized-loot predicate would express the weighted gem table cleanly. NEEDS VERB: admin force-region / grant-quest-stage — Shilo Village access (quest/cutscene) may block the region even after admin teleport, so the gem rock may not bind on a fresh char.'

