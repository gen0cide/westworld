# ============================================================================
# NEEDS VERB backlog — every distinct engine/DSL gap surfaced by these
# archetypes. Each entry is hand-rolled around in the scenarios above; wiring
# any of these collapses the corresponding boilerplate. For the team:
#
#   - world.bank.is_open (accessor exists in dsl/spec/accessors.go but is marked
#     NotYetImplemented; scenarios use the implemented bank_opened event via
#     select instead)
#   - inventory.find_any([id,...]) / multi-id find helper — the 7-way or-chain +
#     null-cascade in the gem loop is verbose; a randomized-loot predicate would
#     express the weighted gem table cleanly
#   - admin force-region / grant-quest-stage — Shilo Village gem-rock region may
#     not bind even after admin teleport because of the quest/cutscene access gate
#   - light_fire(logs) firemaking verb (or confirmed use(tinderbox, logs) path) —
#     Firemaking.onUseObj lights ground logs, so use(tinderbox, inventory_logs)
#     may not fire (writing-routines section 10), blocking the fish-then-cook-on-
#     fire chain
#   - answer-chain for single product-chooser menu (log-cut shafts/shortbow/
#     longbow) — driven via wait_for_dialog+answer(find_option) but flagged
#     fragile per §10
#   - multi-step dialog chain for the anvil two-level menu (smithing category ->
#     item) — §10 chained-menu gap
#   - multi-step dialog chain for the gold-jewellery furnace menus (shape 'ring'
#     -> gem-prompt 'No') — §10 chained-menu gap
#   - single shape-menu answer for the pottery wheel (Pot/Pie dish/Bowl) — §10
#     single-menu case
#   - high_alch(item) / low_alch(item) convenience verb — does not exist; using
#     cast_on_item("High level alchemy", item) by name instead
#   - repeat-N-times-counted-loop (no bounded count-loop form exists; hand-rolled
#     as kills=0 + while kills<N)
#   - NpcView.current_hits / target.hp field (kill detectable only via
#     combat.target==null; re-acquire race)
#   - npc_killed / target_died event (replace combat.target==null polling;
#     distinguish 'my kill' from another corpse)
#   - self.is_in_combat (accessor is a stub, always false per accessors.go:108 —
#     cannot gate retreat/am-I-attacked)
#   - retreat() / disengage() / flee() combat action (only set_duel_rules
#     'retreat' toggle exists; walking away is the sole break-melee path and not
#     guaranteed)
#   - self.prayer.active(N) -> bool / self.prayer.active list (NotYetImplemented
#     per accessors.go:112 — prayer activation only inferable via point drain)
#   - self.combat_style getter (set_combat_style is write-only; style only
#     verifiable via xp-split shape)
#   - self.equipped per-slot accessor / weapon-slot getter (NotYetImplemented;
#     'is a bow equipped' only inferable by item-id presence)
#   - loot_corpse(npc) / loot_nearest() helper (loot hand-rolled via
#     ground_items.by_id + pick_up)
#   - world.ground_items.nearest(pos) / value-sorted accessor (only by_id exists;
#     cannot pick most-valuable nearby drop)
#   - bury(item) alias (only use_inventory_default; eat() exists as food alias but
#     no bury alias)
#   - autocast(spell) mode toggle (magic combat must re-issue cast_on_npc every
#     tick)
#   - HP-threshold/auto-eat config primitive (when-watcher hand-rolled per
#     scenario)
#   - timed prayer-flick primitive (on/wait/off hand-rolled)
#   - ammo-low watcher primitive (arrow depletion polled manually)
#   - session-budget primitive (kill-count / time-box guard hand-rolled with a
#     counter)
#   - CONTENT FIX: combat-magic-attack-on-rat calls cast_on_npc("wind strike",
#     rat) — must be cast_on_npc(rat, 0) (npc first, int spell index second)
#   - CONTENT FIX: combat-prayer-protect-from-melee calls activate_prayer("Protect
#     from missiles") with a name string — verb takes int index 13; and
#     'protect-from-melee' is a misnomer (no such prayer in RSC)
#   - sell(item[, qty]) — sell an inventory item to the open shop; absent from
#     dsl/spec/actions.go (only bank deposit/withdraw + trade offer verbs exist)
#   - buy(item[, qty]) — purchase from the open shop; absent from
#     dsl/spec/actions.go
#   - world.shop / world.shop.is_open / world.shop.stock / world.shop.prices —
#     shop-state accessor; absent from dsl/spec/accessors.go (only bank + trade
#     interaction state exist), so a routine cannot read stock or confirm a
