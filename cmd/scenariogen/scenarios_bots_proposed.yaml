# Bot-archetype scenario catalog (proposed) — multi-step skilling/combat/money/
# banking/travel loops modeled on classic RSC bot scripts (SBot, APOS, AutoRune,
# idlescript). Every id/coord/recipe/xp verified against OpenRSC defs on
# 2026-05-29. MEMBERS world. Menus driven with wait_for_dialog + answer(find_option).
#
# Assembled from per-domain batches: gathering-loops, production-loops,
# combat-loops, money-thieving-loops, banking-travel-loops. All ids are unique
# within this file and do not collide with cmd/scenariogen/scenarios.yaml or
# cmd/scenariogen/scenarios_proposed.yaml (all carry the `bot-` prefix).
#
# A "NEEDS VERB" backlog (every distinct gap surfaced by these archetypes) is
# listed in the YAML comment block at the END of this file for the team.

scenarios:

  # ===== gathering-loops =====

  - id: bot-power-woodcut-normal-drop
    category: skills
    hosts: any-drone
    admin: true
    recall_query: woodcutting normal tree axe logs power chop drop
    setup:
      - setstat 1 woodcut
      - setcurrentstats 1 woodcut
      - item 87 1
      - teleport 124 555
    body:
      - prev_xp = self.skills.woodcut.xp
      - logs_dropped = 0
      - tree = world.locs.search("tree").nearest(self.position)
      - 'if tree == null { abort "FAIL: no normal tree near (124,555)" }'
      - |-
        for i in 0..2 {
            repeat {
                interact_at(tree)
                wait 2
            } until inventory.find(14) != null timeout 60
            log = inventory.find(14)
            if log == null { abort f"FAIL: no logs after chop pass {i}" }
            drop(log)
            logs_dropped = logs_dropped + 1
            wait 1
            tree = world.locs.search("tree").nearest(self.position)
            if tree == null { abort f"FAIL: lost tree binding after pass {i}" }
        }
      - 'if self.skills.woodcut.xp < prev_xp + 300 { abort f"FAIL: woodcut xp delta {self.skills.woodcut.xp - prev_xp} < 300" }'
      - 'if inventory.find(14) != null { abort "FAIL: a Logs item remains in inventory (not all dropped)" }'
    pass: self.skills.woodcut.xp >= prev_xp + 300 and inventory.find(14) == null and logs_dropped == 3
    timeout: 180
    notes: 'idlescript/SBot classic power-woodcutting (chop N, drop each). Scenery Tree def 0/1 ("Tree", cmd1 Chop) confirmed clustered x118-127 y543-569; exact loc (124,555,0) verified in SceneryLocs.json. Logs id 14, exp 100, fell 100, respawn 40 (ObjectWoodcutting.xml). Bronze Axe id 87 just needs to be present (gather verb is the scenery Chop, not use(axe,tree)). 3 logs x 100 = +300 xp asserted vs captured prev.'

