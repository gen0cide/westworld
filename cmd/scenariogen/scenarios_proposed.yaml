# PROPOSED scenario catalog — 47 NEW live-tests covering RSC mechanics
# NOT already present in scenarios.yaml. Structurally identical to
# scenarios.yaml (top-level `scenarios:` key) so this file can be
# concatenated / appended after review.
#
# Counts by category: skills 28, quests 6, combat 6, edges 4, social 2,
# movement 1. Zero id-overlap with the existing 88.
#
# Every entry asserts a REAL outcome (xp gain, a NEW product item that
# differs from all inputs, a stat/position/world change, or a specific
# server message) — never a spawn-then-find false positive.
#
# Ground-truth sources cited per entry in `notes:`. IDs verified against
# /Users/flint/Code/openrsc/server/conf/server/defs/ItemDefs.json,
# the extras/*.xml recipe tables, SpellDef.xml, GameObjectDef.xml +
# locs/SceneryLocs.json, and the authentic skill plugin handlers.
#
# See the YAML comment block at the END of this file for: (a) scenarios
# that need a not-yet-existing DSL verb, and (b) members/ambiguity flags.

scenarios:

  # ===========================================================
  # HERBLAW — identify, unfinished potion, finished potion, drink
  # NOTE: making potions is gated behind Druidic Ritual completion
  #       (Herblaw.java batchPotionMaking: getQuestStage(DRUIDIC_RITUAL)
  #       != -1 aborts). We bypass with the admin `completeallquests`
  #       command (SuperModerator.java) in setup for potion-mixing tests.
  # ===========================================================

  - id: herblaw-identify-marrentill
    category: skills
    hosts: any-drone
    admin: true
    recall_query: herblaw identify marrentill herb leaf experience
    setup:
      - setstat 5 herblaw
      - setcurrentstats 5 herblaw
      - item 435 1
    body:
      - prev = self.skills.herblaw.xp
      - use_inventory_default(inventory.find(435))
      - ok = wait_until(_ => self.skills.herblaw.xp > prev, 5)
      - 'if not ok { abort "herblaw xp never rose identifying marrentill" }'
    pass: inventory.find(445) != null and inventory.find(435) == null
    timeout: 10
    notes: "ItemUnIdentHerbDef.xml: unidentified Marrentill(435) reqLvl 5 -> clean Marrentill(445), exp 15. Real product (445 differs from input 435) + xp gain."

  - id: herblaw-make-unfinished-guam-potion
    category: skills
    hosts: any-drone
    admin: true
    recall_query: herblaw unfinished potion guam vial of water mix
    setup:
      - setstat 10 herblaw
      - setcurrentstats 10 herblaw
      - completeallquests
      - item 444 1
      - item 464 1
    body:
      - prev = self.skills.herblaw.xp
      - 'use(inventory.find(444), inventory.find(464))  # clean guam on vial of water'
      - ok = wait_until(_ => inventory.find(454) != null, 6)
      - 'if not ok { abort "unfinished guam potion (454) never produced" }'
      - 'if self.skills.herblaw.xp <= prev { abort "no herblaw xp from mixing" }'
    pass: inventory.find(454) != null
    timeout: 12
    notes: "ItemHerbDef.xml: clean Guam(444)+Vial of water(464)->Unfinished potion(454), reqLvl 3. Druidic Ritual gate bypassed via completeallquests. Product 454 differs from both inputs."

  - id: herblaw-make-attack-potion
    category: skills
    hosts: any-drone
    admin: true
    recall_query: herblaw attack potion eye of newt unfinished guam secondary
    setup:
      - setstat 5 herblaw
      - setcurrentstats 5 herblaw
      - completeallquests
      - item 454 1
      - item 270 1
    body:
      - prev = self.skills.herblaw.xp
      - 'use(inventory.find(270), inventory.find(454))  # eye of newt on unf guam potion'
      - ok = wait_until(_ => inventory.find(474) != null, 6)
      - 'if not ok { abort "attack potion (474) never produced" }'
      - 'if self.skills.herblaw.xp <= prev { abort "no herblaw xp from finishing potion" }'
    pass: inventory.find(474) != null
    timeout: 12
    notes: "ItemHerbSecond.xml: Eye of newt(270)+Unfinished guam potion(454)->attack Potion(474), reqLvl 3, exp 100. Product 474 differs from inputs."

  - id: herblaw-make-strength-potion
    category: skills
    hosts: any-drone
    admin: true
    recall_query: herblaw strength potion limpwurt root tarromin unfinished
    setup:
      - setstat 12 herblaw
      - setcurrentstats 12 herblaw
      - completeallquests
      - item 456 1
      - item 220 1
    body:
      - prev = self.skills.herblaw.xp
      - 'use(inventory.find(220), inventory.find(456))  # limpwurt root on unf tarromin potion'
      - ok = wait_until(_ => inventory.find(222) != null, 6)
      - 'if not ok { abort "strength potion (222) never produced" }'
      - 'if self.skills.herblaw.xp <= prev { abort "no herblaw xp" }'
    pass: inventory.find(222) != null
    timeout: 12
    notes: "ItemHerbSecond.xml: Limpwurt root(220)+Unfinished tarromin potion(456)->Strength Potion(222), reqLvl 12, exp 200. 456 is the clean-Tarromin(446)+vial unfinished potion."

  - id: herblaw-drink-strength-potion-boosts
    category: skills
    hosts: any-drone
    admin: true
    recall_query: drink strength potion boost current level temporary
    setup:
      - setstat 20 strength
      - setcurrentstats 20 strength
      - item 221 1
    body:
      - base = self.skills.strength.level
      - eat(inventory.find(221))
      - ok = wait_until(_ => self.skills.strength.level > base, 5)
      - 'if not ok { abort f"strength level never boosted (still {self.skills.strength.level} vs base {base})" }'
    pass: self.skills.strength.level > self.skills.strength.max_level and inventory.find(222) != null
    timeout: 10
    notes: "Drinkables.java: FULL_STRENGTH_POTION(221) -> useNormalPotion(STRENGTH, +10%, +3) and degrades to THREE_STRENGTH_POTION(222). Asserts CURRENT level > base max + the next-dose item produced. eat() fires the default Drink action."

