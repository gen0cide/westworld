  - id: movement-walk-long-distance
    category: movement
    hosts: any-drone
    admin: true
    recall_query: walk pathfinder long distance lumbridge varrock
    setup:
      - teleport 122 658
    body:
      - walk_to(125, 630)
      - ok1 = wait_until(_ => distance_to_xy(125, 630) <= 2, 60)
      - 'if not ok1 { abort f"leg 1 failed (at {self.position.x},{self.position.y})" }'
      - walk_to(135, 580)
      - ok2 = wait_until(_ => distance_to_xy(135, 580) <= 2, 90)
      - 'if not ok2 { abort f"leg 2 failed (at {self.position.x},{self.position.y})" }'
      - walk_to(150, 530)
      - ok3 = wait_until(_ => distance_to_xy(150, 530) <= 2, 90)
      - 'if not ok3 { abort f"leg 3 failed (at {self.position.x},{self.position.y})" }'
    pass: distance_to_xy(150, 530) <= 2
    timeout: 260
    notes: Chunked into 3 walk_to calls — RSC pathfinder chokes on long single-shot paths across chunk borders.

  - id: movement-home-teleport
    category: movement
    hosts: any-drone
    admin: true
    setup:
      - teleport 300 542
    body:
      - command("home")
      - ok = wait_until(_ => self.position.x < 150 and self.position.y > 600 and self.position.y < 700, 15)
      - 'if not ok { abort f"home teleport failed (at {self.position.x},{self.position.y})" }'
    pass: self.position.x < 150 and self.position.y > 600
    timeout: 20

  - id: movement-walk-then-stop
    category: movement
    hosts: any-drone
    admin: true
    setup:
      - teleport 122 658
    body:
      - walk_to(130, 658)
      - wait 1
      - walk_to(self.position.x, self.position.y)
      - wait 1
    pass: 'true'
    timeout: 10
    notes: Smoke test for walk + immediate stop. Catches walk-cancel handling.

  - id: movement-pathfind-around-obstacle
    category: movement
    hosts: any-drone
    admin: true
    setup:
      - teleport 124 644
    body:
      - is_ok = is_reachable(126, 642)
      - 'if not is_ok { abort "pathfinder claims unreachable" }'
      - walk_to(126, 642)
      - ok = wait_until(_ => distance_to_xy(126, 642) <= 1, 15)
      - 'if not ok { abort "walk never arrived" }'
    pass: distance_to_xy(126, 642) <= 1
    timeout: 20
