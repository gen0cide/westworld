    recall_query: firemaking tinderbox normal logs light fire
    setup:
      - setstat 1 firemaking
      - setcurrentstats 1 firemaking
      - item 14 6
      - item 166 1
    body:
      # Authentic light: DROP logs, then tinderbox on the GROUND log
      # (opcode 53). use(tinderbox, logs-in-inventory) only nags "...put
      # the logs down before you light them!" — which CONTAINS "light",
      # so the old item-on-item check passed for the WRONG reason. Assert
      # the real fire-catch message instead.
      - lit = false
      - tx = 224
      - |-
        repeat {
            command(f"teleport {tx} 3122")
            wait 2
            drop(inventory.find(14))
            wait 1.5
            gl = world.ground_items.by_id(14, radius=0)
            if gl != null { use(inventory.find(166), gl) }
            lit = wait_until(_ => world.scenery.by_id(97, radius=0) != null, 5)
            tx = tx + 1
        } until lit timeout 40
      - 'if not lit { abort "fire never lit" }'
    pass: world.last_server_message.contains("The fire catches") and world.scenery.by_id(97, radius=0) != null
    timeout: 50

