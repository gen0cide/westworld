      - command("prayer 0")
      - ok = wait_until(_ => self.prayer == 0, 5)
      - 'if not ok { abort f"prayer never dropped to 0 (still {self.prayer})" }'
    pass: self.prayer == 0
    timeout: 10

  - id: wipe-inventory-clears-all
    category: skills
    hosts: any-drone
