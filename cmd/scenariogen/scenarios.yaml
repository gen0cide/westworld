  # ===== banking-travel-loops =====
  # ===========================================================
  # BANKING / TRAVEL LOOPS — bot-script archetypes (members world).
  # Grounded against OpenRSC defs + plugins:
  #   Bankers.java multi() index 0 = "I'd like to access my bank account
  #     please" — bank.open(banker) now auto-picks this option for you.
  #   world.bank.is_open / world.bank.slots / world.bank.has(id) are live
  #     (runtime/views_bank.go) — assert bank-open via world.bank.is_open.
  #   bank.deposit(id,count) / bank.withdraw(id,count) take literal ids (resolveItemAmount).
  #   bank.open(banker) drives the banker access dialog end-to-end and blocks
  #     until the SEND_BANK_OPEN packet flips world.bank.is_open true.
  #   Admin bankitem/bitem/addbank <id> <amt> self-targets to the player's bank
  #     (Admins.spawnItemBank) — pre-stocking the bank directly IS possible.
  # ===========================================================

  - id: bot-bank-run-woodcut-deposit
    category: movement
    hosts: any-drone
    admin: true
    recall_query: woodcutting logs bank deposit varrock west tree banker
    setup:
      - setstat 30 woodcut
      - setcurrentstats 30 woodcut
      - item 12 1
      - teleport 205 460
    body:
      - wait_until(_ => world.locs.search("tree").nearest(self.position) != null, 8)
      - prev_xp = self.skills.woodcutting.xp
      - cycles = 0
      - |-
        repeat {
            tree = world.locs.search("tree").nearest(self.position)
            if tree == null { abort "no tree in view at Varrock-west cluster" }
            repeat {
                interact_at(tree)
                wait 2
            } until inventory.count(14) >= 3 timeout 60
            walk_to(214, 449)
            wat = wait_until(_ => distance_to_xy(214, 449) <= 2, 20)
            if not wat { abort f"never reached banker (at {self.position.x},{self.position.y})" }
            banker = world.npcs.find(n => n.type_id == 95)
            if banker == null { abort "banker (id 95) not in view at Varrock-west" }
            bank.open(banker)
            if not world.bank.is_open { abort "bank never opened after bank.open(banker)" }
            bank.deposit(14, 28)
            wait 1
            bank.close()
            walk_to(205, 460)
            wb = wait_until(_ => distance_to_xy(205, 460) <= 3, 20)
            if not wb { abort f"never returned to tree (at {self.position.x},{self.position.y})" }
            cycles = cycles + 1
        } until cycles >= 2 timeout 150
      - 'note(f"woodcut xp {prev_xp} -> {self.skills.woodcutting.xp}, logs held {inventory.count(14)}")'
    pass: self.skills.woodcutting.xp > prev_xp and inventory.count(14) == 0 and distance_to_xy(205, 460) <= 3
    timeout: 170
    notes: 'Classic gather->deposit-all->return bank-run. Iron Axe=12, Logs=14, tree scenery=1 @ (203-205,458-461), banker NpcId=95 @ (214,449). woodcut 25xp/log. Asserts xp delta vs captured prev + logs cleared from the inventory mirror after deposit. bank.open(banker) drives the banker access dialog and blocks until the bank window is up, so world.bank.is_open is true on return.'

