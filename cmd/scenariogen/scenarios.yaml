    setup:
      - setstat 40 attack
      - setcurrentstats 40 attack
      - setstat 40 strength
      - setcurrentstats 40 strength
      - setstat 40 defense
      - setcurrentstats 40 defense
      - setstat 50 hits
      - setcurrentstats 50 hits
    body:
      - wait 2
      - 'note(f"atk={self.skills.attack.level} str={self.skills.strength.level} def={self.skills.defense.level} hp={self.max_hp}")'
    pass: self.skills.attack.level == 40 and self.skills.strength.level == 40 and self.skills.defense.level == 40 and self.max_hp == 50
    timeout: 10

