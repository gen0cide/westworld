# Scenario catalog — one entry per .routine the generator emits.
#
# Run `go run ./cmd/scenariogen` from the repo root to regenerate
# examples/scenarios/<category>/<id>.routine for every entry.
#
# Field semantics:
#
#   id:           kebab-case unique identifier. Becomes the file name
#                 (<id>.routine) and (kebab → snake) the routine name.
#                 The filename ↔ routine-name validator enforces match.
#
#   category:     skills | combat | quests | social | edges | movement
#                 — used as the output sub-directory.
#
#   hosts:        free-form string describing which host(s) this needs.
#                 "any-drone" for a single host-agnostic scenario;
#                 "any-drone-and-bernard" / "Drone1-and-Drone2" for
#                 multi-host. The runner uses this string to decide
#                 how many cradle processes to spin up.
#
#   admin:        true if the routine relies on admin ::commands (item,
#                 damage, setstat, teleport, wipeinv, etc.). Drone1-20
#                 + Bernard + Delores + Arnold are all admin per the
#                 DB clone.
#
#   recall_query: a string passed to corpus.Recall against the wiki
#                 dump at -corpus. The top hits are written into the
#                 file header so the routine cites the player-facing
#                 knowledge that grounded it. Empty disables grounding.
#
#   precondition: a list of expression-only DSL lines, emitted into a
#                 `require { ... }` block at the top of the routine.
#                 The validator forbids statements here — only Boolean
#                 expressions.
#
#   setup:        a list of admin-command strings (no `::` prefix);
#                 the generator emits `command("<setup>")` with a
#                 `wait 0.5` between each so the server has time to
#                 process before the next.
#
#   body:         raw DSL lines, emitted as-is with 4-space indent.
#                 Use this for everything beyond setup.
#
#   pass:         a DSL expression. If non-empty, the generator emits
#                 a final `if <pass> { return ... } else abort` block,
#                 so leave it empty for scenarios that already abort
#                 explicitly inside body.
#
#   timeout:      seconds — used in the file header for human-readers;
#                 the runner passes it to cradle -dwell.
#
#   notes:        free-form annotation, baked in as a `# Notes:` line.

scenarios:

  # ===========================================================
  # SKILLS — one minimal exercise per RSC skill where feasible.
  # ===========================================================

  - id: heal-via-food
    category: skills
    hosts: any-drone
    admin: true
    recall_query: lobster food eating heal hp
    precondition:
      - self.hp > 0
    setup:
      - item 373 1
    body:
      - 'command(f"damage {self.name} 9")'
      - wait 1
      - lobster = inventory.find(373)
      - 'if lobster == null { abort "lobster never appeared in inventory" }'
      - eat(lobster)
      - ok = wait_until(_ => self.hp > 1, 5)
      - 'if not ok { abort f"eat had no effect after 5s — still at hp={self.hp}" }'
    pass: self.hp > 5
    timeout: 15

  - id: damage-event-fires
    category: skills
    hosts: any-drone
    admin: true
    recall_query: damage taken combat hits skill
    precondition:
      - self.hp >= 5
    body:
      - 'note(f"pre-damage hp={self.hp}")'
      - 'command(f"damage {self.name} 3")'
      - |-
        select {
            on damage_taken(amount, source) {
                note(f"damage_taken: amount={amount} source={source}")
            }
            timeout 8s {
                note f"damage_taken did not fire in 8s (hp now {self.hp}); relying on hp-drop predicate"
            }
        }
    pass: self.hp < self.max_hp
    timeout: 10
    notes: Verifies event.OtherPlayerDamage → damage_taken translation.

  - id: admin-set-stat-cooking
    category: skills
    hosts: any-drone
    admin: true
    recall_query: cooking skill level experience
    setup:
      - setstat 50 cooking
      - setcurrentstats 50 cooking
    body:
      - wait 2
      - 'note(f"cooking_level={self.skills.cooking.level}")'
    pass: self.skills.cooking.level >= 50
    timeout: 8

  - id: admin-set-stats-melee
    category: skills
