<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cradle</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --line:#30363d;
    --fg:#e6edf3; --dim:#8b949e; --accent:#58a6ff; --good:#3fb950; --warn:#d29922;
    --bad:#f85149; --hp:#3fb950; --hpbg:#21262d;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; height:100vh; display:flex; }
  a { color:var(--accent); }
  /* sidebar */
  #side { width:300px; min-width:300px; border-right:1px solid var(--line);
    display:flex; flex-direction:column; height:100vh; }
  #side h1 { font-size:14px; margin:0; padding:12px 14px; border-bottom:1px solid var(--line);
    letter-spacing:.5px; display:flex; justify-content:space-between; align-items:center; }
  #side h1 .count { color:var(--dim); font-weight:normal; }
  #hosts { overflow-y:auto; flex:1; }
  .host { padding:9px 14px; border-bottom:1px solid var(--line); cursor:pointer; display:flex;
    align-items:center; gap:8px; }
  .host:hover { background:var(--panel); }
  .host.sel { background:var(--panel2); border-left:3px solid var(--accent); padding-left:11px; }
  .host .nm { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .host .meta { color:var(--dim); font-size:11px; }
  .dot { width:8px; height:8px; border-radius:50%; flex:none; }
  .s-running{background:var(--good)} .s-paused{background:var(--warn)}
  .s-starting{background:var(--accent)} .s-stopped{background:var(--dim)}
  .s-crashed,.s-restarting{background:var(--bad)}
  /* main */
  #main { flex:1; overflow-y:auto; padding:16px 20px; }
  #empty { color:var(--dim); padding:40px; text-align:center; }
  .head { display:flex; align-items:baseline; gap:12px; margin-bottom:4px; }
  .head .name { font-size:20px; font-weight:600; }
  .badge { font-size:11px; padding:2px 8px; border-radius:10px; background:var(--panel2);
    text-transform:uppercase; letter-spacing:.5px; }
  .sub { color:var(--dim); margin-bottom:6px; }
  .doing { margin-bottom:14px; font-size:12px; color:var(--dim); }
  .doing.active { color:var(--good); }
  .doing b { color:var(--fg); font-weight:600; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:10px; margin-bottom:14px; }
  .stat { background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:8px 10px; }
  .stat .k { color:var(--dim); font-size:11px; text-transform:uppercase; }
  .stat .v { font-size:16px; margin-top:2px; }
  .hpbar { height:6px; background:var(--hpbg); border-radius:3px; margin-top:6px; overflow:hidden; }
  .hpbar > div { height:100%; background:var(--hp); transition:width .3s; }
  .controls { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  button { background:var(--panel2); color:var(--fg); border:1px solid var(--line); border-radius:6px;
    padding:6px 12px; cursor:pointer; font:inherit; }
  button:hover { border-color:var(--accent); }
  button.danger:hover { border-color:var(--bad); color:var(--bad); }
  #evalbox { flex:1; min-width:200px; background:var(--bg); color:var(--fg); border:1px solid var(--line);
    border-radius:6px; padding:6px 10px; font:inherit; }
  .cols { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media(max-width:900px){ .cols{grid-template-columns:1fr} }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; display:flex;
    flex-direction:column; max-height:42vh; }
  .panel h2 { font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--dim);
    margin:0; padding:9px 12px; border-bottom:1px solid var(--line); }
  .feed { overflow-y:auto; padding:8px 12px; flex:1; }
  .feed .row { padding:3px 0; border-bottom:1px solid #21262d22; white-space:pre-wrap; word-break:break-word; }
  .feed .t { color:var(--dim); font-size:11px; margin-right:6px; }
  .speaker { color:var(--accent); }
  .speaker.srv { color:var(--dim); }
  .sys { color:var(--warn); }
  .wide { grid-column:1/-1; }
  .panel.narr { border-color:#3a2d52; }
  .panel.narr h2 { color:#c9b6ef; }
  .feed .narration { color:#d6c8f5; font-style:italic; }
  .kv { display:flex; flex-wrap:wrap; gap:4px 16px; padding:8px 12px; }
  .kv span { color:var(--dim); }
  /* inventory & surroundings: labelled sections of wrapping chips */
  .worldv { padding:8px 12px; display:flex; flex-direction:column; gap:8px; flex:1; min-height:0; overflow-y:auto; }
  .wsec .wlabel { font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--dim); margin-bottom:4px; }
  .wsec .wlabel small { opacity:.6; margin-left:4px; }
  .chips { display:flex; flex-wrap:wrap; gap:4px; }
  .chip { font-size:11px; padding:1px 8px; border-radius:10px; background:var(--panel2); border:1px solid var(--line); color:var(--fg); white-space:nowrap; }
  .chip small { color:var(--dim); font-size:9px; margin-left:3px; }
  .chip.player { border-color:#3a4d6a; }
  .chip.item   { border-color:#2d3a2d; }
  .wsec .none { color:var(--dim); font-size:11px; }
  /* collapsible sections (Mind / Inventory&Surroundings): click the label to fold */
  .wsec[data-sk] > .wlabel { cursor:pointer; user-select:none; }
  .wsec[data-sk] > .wlabel::before { content:'▾'; color:var(--dim); font-size:9px; margin-right:5px; display:inline-block; width:7px; }
  .wsec[data-sk].collapsed > .wlabel::before { content:'▸'; }
  .wsec[data-sk].collapsed > :not(.wlabel) { display:none; }
  /* collapsible authored routine inside a thought card (WRITE ROUTINE) */
  .thought details.adsl-wrap { margin:2px 0; }
  .thought details.adsl-wrap > summary { cursor:pointer; color:var(--dim); font-size:10px; list-style:none; padding:1px 0; }
  .thought details.adsl-wrap > summary::-webkit-details-marker { display:none; }
  .thought details.adsl-wrap > summary::before { content:'▸ '; }
  .thought details.adsl-wrap[open] > summary::before { content:'▾ '; }
  .err { color:var(--bad); padding:8px 12px; }
  /* routine panel: line-numbered DSL source with a live current-line highlight */
  .panel.routine { border-color:#244; }
  .panel.routine h2 { color:#7fd6c2; }
  #d-routine { overflow:auto; padding:6px 0; flex:1; font-size:12px; line-height:1.45; }
  #d-routine .empty { color:var(--dim); padding:8px 12px; }
  #d-routine pre { margin:0; }
  #d-routine .ln { display:flex; padding:0 12px; white-space:pre; }
  #d-routine .ln .num { color:var(--dim); text-align:right; width:2.5em; margin-right:12px;
    flex:none; user-select:none; opacity:.7; }
  #d-routine .ln .src { flex:1; word-break:break-word; white-space:pre-wrap; }
  #d-routine .ln.cur { background:#173a33; border-left:3px solid var(--good); margin-left:-3px; }
  #d-routine .ln.cur .num { color:var(--good); opacity:1; }
  /* analysis (operator-override) — full-bypass takeover surface */
  button.analysis.on { background:#3a1d1d; border-color:var(--bad); color:#ffb4ad; }
  button.analysis.on:hover { border-color:var(--bad); color:var(--bad); }
  .host .abadge { font-size:9px; letter-spacing:.5px; color:#ffb4ad; background:#3a1d1d;
    border:1px solid var(--bad); border-radius:8px; padding:0 5px; margin-left:4px; flex:none; }
  #d-analysis-banner { display:none; margin:0 0 14px; padding:8px 12px; border-radius:8px;
    background:#3a1d1d; border:1px solid var(--bad); color:#ffb4ad;
    font-size:12px; letter-spacing:.5px; align-items:center; gap:10px; }
  #d-analysis-banner.show { display:flex; }
  #d-analysis-banner .pulse { width:9px; height:9px; border-radius:50%; background:var(--bad);
    flex:none; animation:apulse 1.4s ease-in-out infinite; }
  @keyframes apulse { 0%,100%{opacity:1} 50%{opacity:.25} }
  #d-analysis-banner b { color:#ffd7d2; }
  .panel.console { border-color:#5a2730; grid-column:1/-1; }
  .panel.console h2 { color:#ffb4ad; }
  .feed .av { color:var(--dim); }
  .feed .a-command  .ak { color:#7fd6c2; }
  .feed .a-answer   .ak { color:var(--accent); }
  .feed .a-hypothetical .ak { color:#c9b6ef; }
  .feed .a-control  .ak { color:var(--warn); }
  /* thought cards: the per-turn decision stream */
  .feed .thought { display:block; padding:4px 0; border-bottom:1px solid #1c2330; }
  .thead { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin:2px 0; }
  .tturn { color:var(--dim); font-size:10px; }
  .mk { font-size:9px; letter-spacing:.5px; text-transform:uppercase; padding:1px 6px;
    border-radius:8px; background:var(--panel2); color:var(--dim); border:1px solid var(--line); }
  .mk-write_routine { color:#7fd6c2; border-color:#244; }
  .mk-run_routine   { color:var(--accent); }
  .mk-direct_action { color:#c9b6ef; }
  .mk-idle          { color:var(--dim); }
  .ttrig { color:var(--dim); font-size:11px; font-style:italic; }
  .treason { color:var(--fg); margin:2px 0; }
  /* skills/XP grid */
  /* skills: a grid of compact cards — name, big level, small xp */
  .skillgrid { display:grid; grid-template-columns:repeat(auto-fill, minmax(104px, 1fr)); gap:6px; }
  .sk { background:var(--panel2); border:1px solid var(--line); border-radius:6px; padding:5px 8px; }
  .sk .skn { font-size:10px; text-transform:capitalize; color:var(--dim); margin-bottom:1px; }
  .sk .skv { display:flex; align-items:baseline; justify-content:space-between; gap:4px; }
  .sk .skl { font-size:16px; font-weight:600; color:var(--fg); line-height:1; }
  .sk .skl .sb { font-size:10px; font-weight:400; color:var(--good); margin-left:2px; }
  .sk .skx { font-size:9px; color:var(--dim); }
  .sk.sktot { grid-column:1/-1; background:transparent; border:none; border-top:1px solid var(--line); border-radius:0; padding:5px 2px 0; }
  .sk.sktot .skn { color:var(--fg); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
  .sk.sktot .skv { justify-content:space-between; }
  .sk.sktot .skx { font-size:12px; color:var(--fg); }
  .feed .ak { text-transform:uppercase; font-size:10px; letter-spacing:.5px; margin-right:6px;
    padding:0 5px; border-radius:6px; border:1px solid var(--line); }
  .feed .adsl { color:#7fd6c2; display:block; margin-top:2px; opacity:.85; }
  .feed .aerr { color:var(--bad); }
  .feed .arun { color:var(--good); font-size:11px; margin-left:6px; }
  #consolebox { flex:none; margin:0; border:0; border-top:1px solid var(--line); border-radius:0 0 8px 8px;
    background:var(--bg); color:var(--fg); padding:7px 12px; font:inherit; width:100%; }
  #consolebox:disabled { opacity:.5; cursor:not-allowed; }
</style>
</head>
<body>
  <div id="side">
    <h1>CRADLE <span class="count" id="hostcount"></span></h1>
    <div id="hosts"></div>
  </div>
  <div id="main"><div id="empty">select a host</div></div>

<script>
const $ = s => document.querySelector(s);
let sel = null;      // selected host name
let ws = null;       // detail websocket
let detailTimer = null;
let lineTimer = null;          // fast current-line poll (live Routine highlight)
let routineSrc = null;         // last-rendered routine source (re-render only on change)
let routineLine = 0;           // last-highlighted line
let lineQueue = [];            // executed lines awaiting paced replay in the Routine panel
let lastLineSeq = -1;          // highest line_seq we've enqueued (-1 = not yet synced)
let analysisActive = false;    // last-known analysis-mode state for the selected host
let analysisSeeded = false;    // console feed has been backfilled with the last verdict

async function api(path, method='GET', body) {
  const r = await fetch(path, {method, body});
  const t = await r.text();
  let j = null; try { j = t ? JSON.parse(t) : null; } catch(e){ j = t; }
  if (!r.ok) throw new Error((j && j.error) || t || r.status);
  return j;
}

function dotClass(s){ return 's-' + s; }

async function loadHosts() {
  let hosts;
  try { hosts = await api('/api/hosts'); } catch(e){ return; }
  $('#hostcount').textContent = hosts.length;
  const box = $('#hosts');
  box.innerHTML = '';
  for (const h of hosts) {
    const div = document.createElement('div');
    div.className = 'host' + (h.name===sel?' sel':'');
    const meta = h.live ? `${h.x},${h.y} · ${h.hp}/${h.max_hp}hp`
                        : (h.status==='running'?'…':'');
    const ab = h.analysis ? `<span class="abadge">ANALYSIS</span>` : '';
    div.innerHTML = `<span class="dot ${dotClass(h.status)}"></span>
      <span class="nm">${h.name}${ab}<div class="meta">${h.status}${meta?' · '+meta:''}</div></span>`;
    div.onclick = () => selectHost(h.name);
    box.appendChild(div);
  }
}

function selectHost(name) {
  sel = name;
  if (ws) { ws.close(); ws = null; }
  // Reset the Routine-panel cache so a switch always re-renders the source.
  routineSrc = null; routineLine = 0; lineQueue = []; lastLineSeq = -1;
  // Reset analysis-console state so a switch starts from a clean banner + feed.
  analysisActive = false; analysisSeeded = false;
  loadHosts();
  renderShell();
  backfill(name);
  openStream(name);
  loadDetail(name);
  clearInterval(detailTimer);
  detailTimer = setInterval(()=>loadDetail(name), 2000);
  // Fast line-only poll so the current-line highlight feels live as she steps
  // through a routine. Cheap: just the host status JSON (no debug/state).
  clearInterval(lineTimer);
  lineTimer = setInterval(()=>pollLine(name), 350);
}

// backfill seeds the feeds with recent history BEFORE the live stream takes
// over, so a freshly-opened detail view isn't blank. Each request fetches the
// host's recorded event ring filtered by kind; records arrive oldest-first.
async function backfill(name) {
  const ev = async (kind, limit) => {
    try {
      const r = await api(`/api/hosts/${name}/debug/events?kind=${kind}&limit=${limit}`);
      return (r && r.events) || [];
    } catch(e){ return []; }
  };
  // Narration — her in-character note() stream (most alive signal).
  for (const rec of await ev('routine_note', 30)) {
    if (name !== sel) return;
    const d = rec.data || {};
    if (d.Text) feed('feed-narr', rec.at?new Date(rec.at):new Date(), d.Text, 'narration');
  }
  // Thoughts — the full decision: trigger, move kind, reasoning, authored DSL.
  for (const rec of await ev('agent_thought', 20)) {
    if (name !== sel) return;
    renderThought(rec.data || {}, rec.at?new Date(rec.at):new Date());
  }
  // Chat & server — public chat, other players, system + private messages.
  for (const kind of ['chat_received','other_player_chat','system_message','private_message']) {
    for (const rec of await ev(kind, 20)) {
      if (name !== sel) return;
      renderChatRecord(kind, rec.data || {}, rec.at?new Date(rec.at):new Date());
    }
  }
}

// renderChatRecord renders one chat-family event into the chat feed. Shared by
// the historical backfill and the live ws stream so both look identical.
function renderChatRecord(kind, d, at) {
  switch (kind) {
    case 'chat_received': {
      const sp = d.Speaker||d.speaker;
      feed('feed-chat', at, `<span class="speaker">${esc(sp||'someone')}</span>: ${esc(d.Message||d.message||'')}`); break; }
    case 'other_player_chat': {
      const idx = (d.PlayerIndex ?? d.playerIndex);
      const who = playerNames[idx] || (idx!=null ? 'player '+idx : 'someone');
      feed('feed-chat', at, `<span class="speaker">${esc(who)}</span>: ${esc(d.MessageText||d.messageText||'')}`); break; }
    case 'private_message':
      feed('feed-chat', at, `<span class="speaker">${esc(d.Sender||'')}</span> ✉ ${esc(d.Message||'')}`); break;
    case 'system_message':
      feed('feed-chat', at, `<span class="speaker srv">server</span>: ${esc(d.Message||d.message||'')}`, 'sys'); break;
  }
}

function renderShell() {
  $('#main').innerHTML = `
    <div class="head"><span class="name" id="d-name">${sel}</span>
      <span class="badge" id="d-status">…</span>
      <span class="badge" id="d-mesa"></span></div>
    <div class="sub" id="d-goal"></div>
    <div class="doing" id="d-doing"></div>
    <div id="d-analysis-banner">
      <span class="pulse"></span>
      <span><b>ANALYSIS MODE</b> — operator override engaged. Conductor frozen, world replies
      suppressed, memory writes suspended. Directives bypass pearl/persona.</span>
    </div>
    <div class="grid" id="d-vitals"></div>
    <div class="controls">
      <button onclick="ctl('pause')">⏸ Pause</button>
      <button onclick="ctl('resume')">▶ Resume</button>
      <button class="analysis" id="d-analysis-btn" onclick="toggleAnalysis()">⊘ Analysis</button>
      <button class="danger" onclick="ctl('stop')">⏹ Stop</button>
      <input id="evalbox" placeholder='eval DSL, e.g. say("hi")  — Enter to run'
        onkeydown="if(event.key==='Enter')doEval()">
    </div>
    <div class="cols">
      <div class="panel routine"><h2>📜 Routine</h2>
        <div id="d-routine"><div class="empty">no routine running</div></div></div>
      <div class="panel narr"><h2>📓 Narration</h2><div class="feed" id="feed-narr"></div></div>
      <div class="panel"><h2>🧠 Thoughts</h2><div class="feed" id="feed-think"></div></div>
      <div class="panel"><h2>💬 Chat &amp; Server</h2><div class="feed" id="feed-chat"></div></div>
      <div class="panel skills wide"><h2>📊 Skills &amp; XP</h2><div id="d-skills" class="skillgrid"><div class="empty">—</div></div></div>
      <div class="panel wide"><h2>Inventory &amp; Surroundings</h2><div id="d-world" class="worldv"></div></div>
      <div class="panel wide"><h2>🧭 Mind <small>knowledge · relationships · goals</small></h2><div id="d-mind" class="worldv"><div class="empty">—</div></div></div>
      <div class="panel console"><h2>⊘ Operator Console</h2>
        <div class="feed" id="feed-console"></div>
        <input id="consolebox" placeholder='operator directive — e.g. "go to the bank", "?where are you", "would you fight the rat" — Enter to send'
          onkeydown="if(event.key==='Enter')sendDirective()"></div>
    </div>`;
}

async function ctl(action) {
  try { await api(`/api/hosts/${sel}/${action}`, 'POST'); }
  catch(e){ alert(action+': '+e.message); }
  loadDetail(sel); loadHosts();
}

// applyAnalysisState lights/clears the ANALYSIS banner + toggle from the 2s status
// poll (HostStatus.analysis), so the UI tracks the in-game trigger and cradle-ctl
// too — not just clicks here. On first sight of an active host it backfills the
// console feed with the most-recent verdict via GET /analysis.
function applyAnalysisState(name, active) {
  analysisActive = active;
  const banner = $('#d-analysis-banner');
  if (banner) banner.classList.toggle('show', active);
  const btn = $('#d-analysis-btn');
  if (btn) { btn.classList.toggle('on', active); btn.textContent = active ? '⊘ Exit Analysis' : '⊘ Analysis'; }
  const box = $('#consolebox');
  if (box) box.disabled = false; // console always usable: a directive auto-enters analysis
  if (active && !analysisSeeded) {
    analysisSeeded = true;
    seedAnalysisFeed(name);
  }
  if (!active) analysisSeeded = false;
}

// seedAnalysisFeed pulls the most-recent verdict so a freshly-opened console isn't
// blank while a host is already under analysis (e.g. engaged in-game).
async function seedAnalysisFeed(name) {
  let r; try { r = await api(`/api/hosts/${name}/analysis`); } catch(e){ return; }
  if (name !== sel || !r || !r.last) return;
  renderVerdict(r.last);
}

// toggleAnalysis enters/exits operator-override analysis mode and echoes the
// control verdict into the console. The 2s poll keeps the banner/toggle in sync,
// but we update optimistically here so the click feels immediate.
async function toggleAnalysis() {
  const name = sel;
  const action = analysisActive ? 'exit' : 'enter';
  try {
    const res = await api(`/api/hosts/${name}/analysis/${action}`, 'POST');
    if (name !== sel) return;
    renderVerdict(res);
    applyAnalysisState(name, !!res.active);
  } catch(e){
    feed('feed-console', new Date(), `analysis ${action} failed: ${esc(e.message)}`, 'aerr');
  }
  loadHosts();
}

// sendDirective posts the typed operator directive to the interpreter and renders
// the structured verdict. Mirrors the in-game "!<name> <directive>" path; the
// server auto-enters analysis mode if it was off (control-plane-authoritative).
async function sendDirective() {
  const name = sel;
  const box = $('#consolebox'); const text = box.value.trim(); if (!text) return;
  feed('feed-console', new Date(), `<span class="av">▶ ${esc(text)}</span>`);
  box.value=''; box.disabled = true;
  try {
    const res = await api(`/api/hosts/${name}/analysis/directive`, 'POST', text);
    if (name === sel) { renderVerdict(res); applyAnalysisState(name, !!res.active); }
  } catch(e){
    if (name === sel) feed('feed-console', new Date(), `directive failed: ${esc(e.message)}`, 'aerr');
  } finally {
    if (name === sel) { box.disabled = false; box.focus(); }
  }
  loadHosts();
}

// renderVerdict draws one AnalysisResult {kind,text,dsl,executed,active,error}
// into the console feed: a kind tag, the flat-affect text, an optional DSL line
// (what ran / would run), an executed/dry-run marker, and any error.
function renderVerdict(r) {
  if (!r) return;
  const kind = r.kind || 'control';
  let html = `<span class="ak">${esc(kind)}</span>`;
  html += `<span class="atext">${esc(r.text||'')}</span>`;
  if (kind === 'command') html += r.executed
    ? `<span class="arun">✓ executed</span>` : `<span class="aerr arun">✗ not executed</span>`;
  if (kind === 'hypothetical') html += `<span class="arun">⊘ dry run</span>`;
  if (r.dsl) html += `<code class="adsl">${esc(r.dsl)}</code>`;
  if (r.error) html += `<div class="aerr">error: ${esc(r.error)}</div>`;
  feed('feed-console', new Date(), html, 'a-'+kind);
}

// renderThought draws one agent_thought (the per-turn decision) as a card: a
// header (turn · move kind · what triggered it), her first-person reasoning, and
// the DSL she authored this turn. This is the visible decision-making stream.
function renderThought(d, at) {
  if (!d || (!d.reasoning && !d.dsl && !d.move_kind)) return;
  const head = [];
  if (d.turn) head.push(`<span class="tturn">#${d.turn}</span>`);
  if (d.move_kind) head.push(`<span class="mk mk-${esc(d.move_kind)}">${esc(d.move_kind.replace('_',' '))}</span>`);
  if (d.trigger) head.push(`<span class="ttrig" title="${esc(d.trigger)}">${esc(d.trigger)}</span>`);
  let html = head.length ? `<div class="thead">${head.join('')}</div>` : '';
  if (d.reasoning) html += `<div class="treason">${esc(d.reasoning)}</div>`;
  if (d.dsl) {
    const lines = d.dsl.split('\n').length;
    html += `<details class="adsl-wrap"><summary>routine · ${lines} lines</summary><code class="adsl">${esc(d.dsl)}</code></details>`;
  }
  feed('feed-think', at, html, 'thought');
}

async function doEval() {
  const box = $('#evalbox'); const line = box.value.trim(); if(!line) return;
  feed('feed-think', new Date(), `▶ ${line}`, 'sys');
  try {
    const r = await api(`/api/hosts/${sel}/debug/eval`, 'POST', line);
    feed('feed-think', new Date(), `= ${r.ok ? (r.value??'ok') : ('error: '+r.error)}`, r.ok?'':'sys');
  } catch(e){ feed('feed-think', new Date(), 'eval failed: '+e.message, 'sys'); }
  box.value='';
}

async function loadDetail(name) {
  if (name !== sel) return;
  let st; try { st = await api(`/api/hosts/${name}`); } catch(e){ return; }
  const badge = $('#d-status'); if(badge){ badge.textContent = st.status; }
  const mesa = $('#d-mesa'); if(mesa){ mesa.textContent = st.mesa? 'mesa '+st.mesa : 'offline'; }
  const goal = $('#d-goal');
  if(goal){ goal.textContent = st.goal || '(scripted host)'; if(st.err) goal.innerHTML += ` <span class="err">— ${st.err}</span>`; }
  const doing = $('#d-doing');
  if(doing){
    const cur = st.current_routine;
    if (cur && (st.status==='running' || st.status==='paused')) {
      doing.className = 'doing active';
      doing.innerHTML = `doing: <b>${cur}</b>`;
    } else {
      doing.className = 'doing';
      doing.textContent = (st.status==='running'||st.status==='paused') ? 'doing: (idle)' : '';
    }
  }
  renderRoutine(st);
  applyAnalysisState(name, !!st.analysis);

  let s = null, m = null;
  if (st.status==='running' || st.status==='paused') {
    try { s = await api(`/api/hosts/${name}/debug/state`); } catch(e){}
    try { m = await api(`/api/hosts/${name}/debug/mind`); } catch(e){}
  }
  renderVitals(st, s);
  if (s) { renderWorld(s); renderSkills(s); }
  if (m) renderMind(m);
}

// renderSkills draws the per-skill level + XP grid. A boosted/drained current
// level (cur != base) is shown next to the base in parentheses.
function renderSkills(s) {
  const g = $('#d-skills'); if (!g) return;
  const sk = s.skills || [];
  if (!sk.length) { g.innerHTML = '<div class="empty">—</div>'; return; }
  let total = 0;
  const cells = sk.map(k => {
    total += k.xp || 0;
    const boost = (k.cur != null && k.cur !== k.level) ? `<span class="sb">${k.cur}</span>` : '';
    return `<div class="sk"><div class="skn">${esc(k.name)}</div>`
      + `<div class="skv"><span class="skl">${k.level}${boost}</span>`
      + `<span class="skx">${(k.xp || 0).toLocaleString()}</span></div></div>`;
  });
  g.innerHTML = cells.join('')
    + `<div class="sk sktot"><div class="skv"><span class="skn">total xp</span><span class="skx">${total.toLocaleString()}</span></div></div>`;
}

// renderRoutine draws the live Routine panel. The line-numbered source block is
// re-rendered ONLY when the source string changes (cached in routineSrc); on
// every other update just the highlighted line moves. This keeps the panel cheap
// to refresh on the fast line poll.
function renderRoutine(st) {
  const box = $('#d-routine'); if (!box) return;
  const running = st.status==='running' || st.status==='paused';
  const src = (running && st.current_routine_source) ? st.current_routine_source : '';
  if (src !== routineSrc) {
    routineSrc = src;
    routineLine = 0;
    lineQueue = []; lastLineSeq = -1; // new routine — drop any pending replay
    if (!src) {
      // No inline source: either nothing running, or a file/library routine
      // that only carries a label. Show the label when we have one.
      const label = (running && st.current_routine) ? st.current_routine : null;
      box.innerHTML = label
        ? `<div class="empty">running <b>${esc(label)}</b> (no inline source)</div>`
        : `<div class="empty">no routine running</div>`;
    } else {
      const lines = src.replace(/\n$/,'').split('\n');
      const pre = document.createElement('pre');
      lines.forEach((ln, i) => {
        const row = document.createElement('div');
        row.className = 'ln';
        row.dataset.line = i+1;
        row.innerHTML = `<span class="num">${i+1}</span><span class="src">${esc(ln)||' '}</span>`;
        pre.appendChild(row);
      });
      box.innerHTML = '';
      box.appendChild(pre);
    }
  }
  if (src) highlightLine(st.current_line || 0);
}

// highlightLine moves the current-line marker without touching the rest of the
// rendered source block. No-op when the target line hasn't changed.
function highlightLine(line) {
  if (line === routineLine) return;
  const box = $('#d-routine'); if (!box) return;
  const prev = box.querySelector('.ln.cur'); if (prev) prev.classList.remove('cur');
  routineLine = line;
  if (!line) return;
  const row = box.querySelector(`.ln[data-line="${line}"]`);
  if (row) {
    row.classList.add('cur');
    row.scrollIntoView({block:'nearest'});
  }
}

// pollLine is the fast (~350ms) status poll: while a routine with inline source
// is running it ENQUEUES the lines executed since the last poll (from the
// conductor's line trace) for paced replay, so fast statements between waits are
// seen instead of skipped. A separate timer (replayLine) steps the highlight.
async function pollLine(name) {
  if (name !== sel || !routineSrc) return;
  let st; try { st = await api(`/api/hosts/${name}`); } catch(e){ return; }
  if (name !== sel) return;
  const running = st.status==='running' || st.status==='paused';
  const src = (running && st.current_routine_source) ? st.current_routine_source : '';
  if (src !== routineSrc) { renderRoutine(st); return; } // source changed — full re-render (also resets the queue)

  const seq = st.line_seq || 0;
  const trace = st.line_trace || [];
  if (lastLineSeq < 0) {
    // First sight of this routine: jump to the current line, don't replay history.
    lastLineSeq = seq;
    highlightLine(st.current_line || 0);
    return;
  }
  if (seq > lastLineSeq) {
    // Enqueue the lines executed since last poll — the tail `n` of the trace ring
    // (older ones beyond the ring are unavoidably lost; the ring holds the last 64).
    const n = Math.min(seq - lastLineSeq, trace.length);
    for (let i = trace.length - n; i < trace.length; i++) lineQueue.push(trace[i]);
    lastLineSeq = seq;
    // Bound the backlog so a long stall can't make the replay run forever behind.
    if (lineQueue.length > 64) lineQueue = lineQueue.slice(lineQueue.length - 64);
  }
}

// replayLine steps the Routine-panel highlight through one queued line at a time,
// on a slight delay, so every executed line is visible — not just the ones the
// interpreter happened to be blocked on (waits) when the status was polled. When
// the backlog is large it advances a few lines per tick to catch up.
function replayLine() {
  if (!lineQueue.length || sel === null || !routineSrc) return;
  const step = lineQueue.length > 12 ? 3 : 1; // catch up if we've fallen behind
  let line;
  for (let i = 0; i < step && lineQueue.length; i++) line = lineQueue.shift();
  if (line != null) highlightLine(line);
}
setInterval(replayLine, 90);

function esc(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function renderVitals(st, s) {
  const g = $('#d-vitals'); if(!g) return;
  const cells = [];
  cells.push(stat('Status', st.status));
  if (s) {
    cells.push(stat('Position', `${s.x}, ${s.y}`));
    const pct = s.max_hp? Math.round(100*s.hp/s.max_hp):0;
    cells.push(`<div class="stat"><div class="k">HP</div><div class="v">${s.hp}/${s.max_hp}</div>
      <div class="hpbar"><div style="width:${pct}%"></div></div></div>`);
    cells.push(stat('Fatigue', (s.fatigue||0)+'%'));
    cells.push(stat('Combat', s.combat_level||'—'));
    cells.push(stat('Inventory', `${s.inventory_used||0}/${(s.inventory_used||0)+(s.inventory_free||0)}`));
  }
  if (st.restarts) cells.push(stat('Restarts', st.restarts));
  g.innerHTML = cells.join('');
}
function stat(k,v){ return `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`; }

// playerNames maps a player INDEX -> name, refreshed from each /state poll, so the
// chat panel can resolve other_player_chat (which carries only PlayerIndex) to a name.
let playerNames = {};

// collapsedSecs persists which .wsec sections the operator folded, keyed by a
// stable panel:label key — so a fold survives the ~per-second re-render (the panels
// rebuild their innerHTML each poll). A delegated click on a section label toggles it.
const collapsedSecs = new Set();
function collapsibleSec(key, label, count, inner) {
  const col = collapsedSecs.has(key) ? ' collapsed' : '';
  return `<div class="wsec${col}" data-sk="${esc(key)}"><div class="wlabel">${label}${count!=null?`<small>${count}</small>`:''}</div>`
    + (inner ? `<div class="chips">${inner}</div>` : `<div class="none">—</div>`) + `</div>`;
}
document.addEventListener('click', e => {
  const lab = e.target.closest('.wsec[data-sk] > .wlabel');
  if (!lab) return;
  const sec = lab.parentElement, key = sec.getAttribute('data-sk');
  if (collapsedSecs.has(key)) collapsedSecs.delete(key); else collapsedSecs.add(key);
  sec.classList.toggle('collapsed');
});

// renderMind draws the host's three mind structures (the inspector / debugging
// keystone): world-knowledge ledger, trust ledger, and intention graph + open
// questions. Mirrors renderWorld's chip/section style. Data from /debug/mind.
function renderMind(m) {
  const w = $('#d-mind'); if(!w) return;
  const chip = (txt, cls, sub, title) =>
    `<span class="chip${cls?' '+cls:''}"${title?` title="${esc(title)}"`:''}>${esc(txt)}${sub!=null?`<small>${esc(sub)}</small>`:''}</span>`;
  const sec = (label, count, inner) => collapsibleSec('mind:'+label, label, count, inner);
  const pct = v => Math.round((v||0)*100)+'%';

  const know = (m.knowledge||[]).map(f =>
    chip(f.subject, 'item', `${f.kind} ·${pct(f.confidence)}${f.provenance?' ·'+f.provenance:''}`, f.top_claim));
  const rels = (m.relationships||[]).map(r =>
    chip(r.name, 'player', `${r.grade} ·met ${r.familiar}`));
  const goals = (m.goal_nodes||[]).filter(n => n.kind!=='open_question').map(n =>
    chip(n.label||n.id, '', `${n.kind}/${n.status}${n.progress?' ·'+pct(n.progress):''}`));
  const edges = (m.goal_edges||[]).map(e =>
    `<span class="none">${esc(e.from)} →${esc(e.rel)}→ ${esc(e.to)}</span>`);
  const oq = (m.open_questions||[]).map(q => chip(q.label||q.id, '', q.status));

  w.innerHTML = sec('knowledge', know.length||null, know.join(''))
    + sec('relationships', rels.length||null, rels.join(''))
    + sec('goals', goals.length||null, goals.join(''))
    + sec('goal edges', edges.length||null, edges.join(' '))
    + sec('open questions', oq.length||null, oq.join(''));
}

function renderWorld(s) {
  const w = $('#d-world'); if(!w) return;
  playerNames = {};
  (s.players||[]).forEach(p => { if (p.index != null && p.name) playerNames[p.index] = p.name; });
  const chip = (txt, cls) => `<span class="chip${cls ? ' ' + cls : ''}">${esc(txt)}</span>`;
  const sec = (label, count, inner) => collapsibleSec('world:'+label, label, count, inner);

  // items: name ×amount
  const items = (s.inventory || []).filter(i => i.item_id >= 0)
    .map(i => chip(i.amount > 1 ? `${i.name || i.item_id} ×${i.amount}` : (i.name || i.item_id), 'item'));
  // npcs: aggregate by name with counts (so it's "Man ×4", not "Man, Man, Man, Man")
  const counts = {};
  (s.npcs || []).forEach(n => { const nm = n.name || ('npc ' + n.type_id); counts[nm] = (counts[nm] || 0) + 1; });
  const npcs = Object.entries(counts).sort((a, b) => b[1] - a[1])
    .map(([nm, c]) => chip(c > 1 ? `${nm} ×${c}` : nm));
  // players: name + position
  const players = (s.players || []).filter(p => p.name)
    .map(p => `<span class="chip player">${esc(p.name)}<small>${p.x},${p.y}</small></span>`);

  let html = sec('items', items.length || null, items.join(''))
    + sec('npcs', (s.npcs || []).length || null, npcs.join(''))
    + sec('players', players.length || null, players.join(''));
  if (s.dialog_open) {
    const opts = (s.dialog_options || []).map(esc).join(' · ');
    html += `<div class="wsec"><div class="wlabel">dialog</div><div class="chips"><span class="chip">${esc(s.dialog_text || '(open)')}</span>`
      + (opts ? `<span class="none">${opts}</span>` : '') + `</div></div>`;
  }
  w.innerHTML = html;
  // server messages feed (one-sided chat: what she heard from the server)
  for (const m of (s.recent_server_messages||[])) seedServer(m);
}

let seenServer = new Set();
function seedServer(m){ if(seenServer.has(m)) return; seenServer.add(m);
  feed('feed-chat', new Date(), m, 'sys'); }

function openStream(name) {
  seenServer = new Set();
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(`${proto}://${location.host}/api/hosts/${name}/debug/ws`);
  ws.onmessage = ev => {
    let rec; try { rec = JSON.parse(ev.data); } catch(e){ return; }
    const d = rec.data || {};
    const at = rec.at ? new Date(rec.at) : new Date();
    switch (rec.kind) {
      case 'agent_thought':
        renderThought(d, at); break;
      case 'routine_note':
        if (d.Text) feed('feed-narr', at, d.Text, 'narration'); break;
      case 'chat_received':
      case 'other_player_chat':
      case 'private_message':
      case 'system_message':
        renderChatRecord(rec.kind, d, at); break;
    }
  };
}

function feed(id, at, html, cls) {
  const f = document.getElementById(id); if(!f) return;
  const atBottom = f.scrollHeight - f.scrollTop - f.clientHeight < 30;
  const row = document.createElement('div');
  row.className = 'row' + (cls?' '+cls:'');
  const ts = at.toLocaleTimeString();
  row.innerHTML = `<span class="t">${ts}</span>${html}`;
  f.appendChild(row);
  while (f.childElementCount > 300) f.removeChild(f.firstChild);
  if (atBottom) f.scrollTop = f.scrollHeight;
}

loadHosts();
setInterval(loadHosts, 2500);
</script>
