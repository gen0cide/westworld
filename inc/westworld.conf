	pvp_reattack_timer: 5
	max_pvp_melee_attack_distance: 3
	shuffle_pid_order: true
	shuffle_pid_order_interval: 500
	spell_range_distance: 4
	want_corrected_skilling_xp: false
	summon_all_player_limit: 15
	server_sided_word_filtering: false               # MODIFIED: agents may say things, filter is admin overhead
	server_sided_word_space_filtering: false
	monitor_online: false                            # MODIFIED: dev server, no external monitoring
	monitor_ip_timeout: 100
	discord_downtime_reports_milliseconds_down_before_report: 1000
	monitor_automatic_shutdown: false

