# Westworld World Config
#
# Base: OpenRSC preservation.conf (authentic-content settings preserved verbatim).
# Modifications: anti-abuse/network limits removed so a 500-host bot swarm
# from a single machine can connect. F2P enforced (member_world: false) so
# the server-side gate locs constrain hosts to the F2P map area.
#
# Run with: cd ~/Code/openrsc/server && ant runserver -DconfFile=../../westworld/inc/westworld
# (adjust path resolution as needed — the conf file currently expects to live in
# ~/Code/openrsc/server/ — see docs/server-config.md for the deployment pattern)

database:
	db_name: westworld

world:
	server_name: Westworld
	server_name_welcome: Westworld
	welcome_text: This world has been opened to its hosts.
	display_logo_sprite: true
	logo_sprite_id: 2010
	game_tick: 640
	walking_tick: 640
	milliseconds_between_spells: 1900
	want_custom_walking_speed: false
	idle_timer: 0                                    # MODIFIED: bots may sit idle deliberately; never auto-kick
	auto_save: 120000
	client_version: 10010
	enforce_custom_client_version: false             # MODIFIED: our Go client identifies differently
	server_port: 43596
	ws_server_port: 43496
	want_feature_websockets: true
	max_connections_per_ip: 10000                    # MODIFIED: 500+ bots from a single host
	max_connections_per_second: 10000                # MODIFIED
	max_packets_per_second: 1000                     # MODIFIED
	max_logins_per_second: 1000                      # MODIFIED: mass swarm startup
	max_logins_per_server_per_tick: 100              # MODIFIED
	max_password_guesses_per_five_minutes: 100000    # MODIFIED: disabled effectively
	network_flood_ip_ban_minutes: 0                  # MODIFIED: never IP-ban from this signal
	suspicious_player_ip_ban_minutes: 0              # MODIFIED: never IP-ban from this signal
	server_location: USA
	session_id_sender_timer: 640
	max_players: 5000                                # MODIFIED: room for swarm + headroom
	max_players_per_ip: 10000                        # MODIFIED
	avatar_generator: false
	member_world: false                              # MODIFIED: F2P. Server-side gate locs enforce geographic confinement.
	want_pcap_logging: false                         # MODIFIED: reduce server overhead with 500 hosts
	world_number: 1
	player_level_limit: 99
	want_experience_cap: false
	experience_limit: -1
	combat_exp_rate: 1                               # AUTHENTIC
	skilling_exp_rate: 1                             # AUTHENTIC
	wilderness_boost: 0                              # AUTHENTIC
	skull_boost: 0                                   # AUTHENTIC
	double_exp: false
	npc_respawn_multiplier: 1.0                      # AUTHENTIC
	want_registration_limit: false                   # MODIFIED: bots register en masse
	registration_limit_count: 100000                 # MODIFIED
	packet_limit: 1000                               # MODIFIED
	connection_limit: 10000                          # MODIFIED
	connection_timeout: 15
	want_fatigue: true                               # AUTHENTIC: fatigue is part of authentic gameplay; tests bot's sleepword handling
	warn_excessive_captcha_failure: false            # MODIFIED: not running mod alerts
	load_prerendered_sleepwords: true                # AUTHENTIC
	load_special_prerendered_sleepwords: true
	stop_skilling_fatigued: 1                        # AUTHENTIC
	aggro_range: 1                                   # AUTHENTIC
	character_creation_mode: 0                       # AUTHENTIC
	ring_of_recoil_limit: 40
	ring_of_forging_uses: 75
	dwarven_ring_uses: 29
	dwarven_ring_bonus: 3
	is_localhost_restricted: false                   # MODIFIED: allow 127.0.0.1 connections
	location_data: 1                                 # AUTHENTIC (incl discontinued)
	want_fixed_broken_mechanics: true                # AUTHENTIC
	want_decorated_mod_room: false
	want_auto_server_shutdown: false
	restart_hour: 7
	want_reset_event: false
	based_map_data: 64
	based_config_data: 85
	features_sleep: true
	restrict_item_id: 1289
	restrict_scenery_id: 1188
	respawn_location_x: 120
	respawn_location_y: 648
	can_feature_membs: false                         # MODIFIED: F2P only
	show_tutorial_skip_option: true
	skip_tutorial_gives_items: false
	combat_level_non_melee_mask: 7
	osrs_combat_melee: false
	osrs_combat_ranged: false
	uses_retro_stock_sensitivity: false
	pidless_catching: true
	pvm_catching_distance: 1
